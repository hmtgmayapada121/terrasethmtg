<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERRASET Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #102B3A;
  --gold: #D4AF37;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
  scroll-behavior: smooth;
}

/* HERO */
.hero {
  height: 100vh;
  background:
    linear-gradient(rgba(16,43,58,0.65), rgba(16,43,58,0.9)),
    url('hero-bg.png');
  background-size: cover;
  background-position: center;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* LOGO */
.logo-hero {
  position: absolute;
  top: 30px;
  left: 50px;
}

.logo-hero img {
  width: 75px;
  transition: 0.3s;
}

.logo-hero img:hover {
  transform: scale(1.1);
}

/* CART */
.cart-btn {
  position: absolute;
  top: 30px;
  right: 50px;
  background: var(--gold);
  padding: 12px 16px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 18px;
}

/* HERO CONTENT */
.hero-content {
  text-align: center;
  color: white;
  animation: fadeUp 1.2s ease;
}

.hero-content h1 {
  font-size: 50px;
  color: var(--gold);
}

.hero-content p {
  margin-top: 10px;
  opacity: 0.8;
}

/* BUTTON */
.hero-btn {
  margin-top: 25px;
  background: var(--gold);
  color: black;
  padding: 12px 24px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 600;
  display: inline-block;
  transition: 0.3s;
}

.hero-btn:hover {
  transform: scale(1.05);
}

/* ANIMATION */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* SECTION */
.section {
  padding: 80px 60px;
}

/* TITLE */
.section h2 {
  margin-bottom: 30px;
  font-size: 28px;
}

/* PRODUK */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px,1fr));
  gap: 30px;
}

.card {
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
}

.card img {
  width: 100%;
  height: 230px;
  object-fit: cover;
}

.card-body {
  padding: 15px;
  text-align: center;
}

.price {
  color: var(--gold);
  font-weight: bold;
  margin: 10px 0;
}

button {
  background: var(--gold);
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* CART */
.cart {
  position: fixed;
  right: -320px;
  top: 0;
  width: 320px;
  height: 100%;
  background: white;
  box-shadow: -5px 0 20px rgba(0,0,0,0.3);
  padding: 20px;
  transition: 0.3s;
}

.cart.active {
  right: 0;
}

/* FOOTER */
footer {
  background: var(--navy);
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

  <div class="logo-hero">
    <img src="logo.png">
  </div>

  <div class="cart-btn" onclick="toggleCart()">🛒</div>

  <div class="hero-content">
    <h1>TERRASET</h1>
    <p>Official Merchandise HMTG Mayapada ITERA</p>
    <div class="hero-btn" onclick="scrollToProduk()">Shop Now</div>
  </div>

</section>

<!-- PRODUK -->
<section class="section" id="produk">
  <h2>Produk Kami</h2>

  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="card-body">
        <h3>T-Shirt</h3>
        <div class="price">Rp 85.000</div>
        <button onclick="addToCart('T-Shirt',85000)">Tambah</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="card-body">
        <h3>Cap</h3>
        <div class="price">Rp 65.000</div>
        <button onclick="addToCart('Cap',65000)">Tambah</button>
      </div>
    </div>

  </div>
</section>

<!-- CART -->
<div class="cart" id="cart">
  <h3>Keranjang</h3>
  <div id="cart-items"></div>
  <div id="total"></div>
  <button onclick="checkout()">Checkout</button>
</div>

<footer>
  © TERRASET HMTG MAYAPADA ITERA
</footer>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  renderCart();
}

function renderCart() {
  let items = document.getElementById("cart-items");
  let total = 0;
  items.innerHTML = "";

  cart.forEach(i => {
    items.innerHTML += `<div>${i.name} - Rp ${i.price}</div>`;
    total += i.price;
  });

  document.getElementById("total").innerText = "Total: Rp " + total;
}

function toggleCart() {
  document.getElementById("cart").classList.toggle("active");
}

function checkout() {
  let pesan = "Halo TERRASET, saya mau pesan:\n";
  cart.forEach(i => pesan += "- " + i.name + "\n");

  window.open("https://wa.me/628XXXXXXXXXX?text=" + encodeURIComponent(pesan));
}

function scrollToProduk() {
  document.getElementById("produk").scrollIntoView();
}
</script>

</body>
</html>
