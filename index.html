<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERRASET Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --navy: #102B3A;
  --gold: #D4AF37;
  --cream: #F2E8C9;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #fff;
}

/* HEADER */
header {
  background: var(--navy);
  color: white;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  color: var(--gold);
  font-weight: 600;
  font-size: 20px;
}

.cart-btn {
  background: var(--gold);
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
}

/* HERO */
.hero {
  height: 80vh;
  background: linear-gradient(rgba(16,43,58,0.8), rgba(16,43,58,0.9)),
              url('https://via.placeholder.com/1200');
  background-size: cover;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}

.hero h1 {
  font-size: 40px;
  color: var(--gold);
}

.hero p {
  margin-top: 10px;
}

/* SECTION */
.section {
  padding: 60px 40px;
}

/* PRODUK */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px,1fr));
  gap: 25px;
}

.card {
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.card-body {
  padding: 15px;
  text-align: center;
}

.price {
  color: var(--gold);
  font-weight: bold;
  margin: 10px 0;
}

button {
  background: var(--gold);
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* CART */
.cart {
  position: fixed;
  right: -300px;
  top: 0;
  width: 300px;
  height: 100%;
  background: white;
  box-shadow: -5px 0 15px rgba(0,0,0,0.2);
  padding: 20px;
  transition: 0.3s;
}

.cart.active {
  right: 0;
}

.cart h3 {
  margin-bottom: 10px;
}

.cart-item {
  margin-bottom: 5px;
  font-size: 14px;
}

.total {
  margin-top: 10px;
  font-weight: bold;
}

/* FOOTER */
footer {
  background: var(--navy);
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <div class="logo">TERRASET</div>
  <div class="cart-btn" onclick="toggleCart()">🛒</div>
</header>

<section class="hero">
  <div>
    <h1>TERRA • SET • TOGETHER</h1>
    <p>Official Merchandise HMTG Mayapada ITERA</p>
  </div>
</section>

<section class="section">
  <h2>Produk Kami</h2>

  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="card-body">
        <h3>T-Shirt</h3>
        <div class="price" data-price="85000">Rp 85.000</div>
        <button onclick="addToCart('T-Shirt',85000)">Tambah</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="card-body">
        <h3>Cap</h3>
        <div class="price">Rp 65.000</div>
        <button onclick="addToCart('Cap',65000)">Tambah</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="card-body">
        <h3>Tote Bag</h3>
        <div class="price">Rp 70.000</div>
        <button onclick="addToCart('Tote Bag',70000)">Tambah</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="card-body">
        <h3>Tumbler</h3>
        <div class="price">Rp 90.000</div>
        <button onclick="addToCart('Tumbler',90000)">Tambah</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="card-body">
        <h3>Sticker</h3>
        <div class="price">Rp 10.000</div>
        <button onclick="addToCart('Sticker',10000)">Tambah</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="card-body">
        <h3>Keychain</h3>
        <div class="price">Rp 15.000</div>
        <button onclick="addToCart('Keychain',15000)">Tambah</button>
      </div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300">
      <div class="card-body">
        <h3>Pin</h3>
        <div class="price">Rp 12.000</div>
        <button onclick="addToCart('Pin',12000)">Tambah</button>
      </div>
    </div>

  </div>
</section>

<div class="cart" id="cart">
  <h3>Keranjang</h3>
  <div id="cart-items"></div>
  <div class="total" id="total"></div>
  <button onclick="checkout()">Checkout</button>
</div>

<footer>
  © TERRASET HMTG MAYAPADA ITERA
</footer>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  renderCart();
}

function renderCart() {
  let items = document.getElementById("cart-items");
  let total = 0;
  items.innerHTML = "";

  cart.forEach(i => {
    items.innerHTML += `<div class="cart-item">${i.name} - Rp ${i.price}</div>`;
    total += i.price;
  });

  document.getElementById("total").innerText = "Total: Rp " + total;
}

function toggleCart() {
  document.getElementById("cart").classList.toggle("active");
}

function checkout() {
  let pesan = "Halo TERRASET, saya mau pesan:\n";
  cart.forEach(i => {
    pesan += "- " + i.name + "\n";
  });

  window.open("https://wa.me/628XXXXXXXXXX?text=" + encodeURIComponent(pesan));
}
</script>

</body>
</html>
